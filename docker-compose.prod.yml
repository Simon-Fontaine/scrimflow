services:
  # --- Database (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    container_name: scrimflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - scrimflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache & Queue (Redis) ---
  cache:
    image: redis:7-alpine
    container_name: scrimflow_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - cache_data:/data
    networks:
      - scrimflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Object Storage S3 (MinIO) ---
  storage:
    image: minio/minio:latest
    container_name: scrimflow_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console
    volumes:
      - storage_data:/data
    networks:
      - scrimflow_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO Initialization (Create Buckets) ---
  storage-init:
    image: minio/mc
    container_name: scrimflow_storage_init
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set scrimflow http://storage:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      /usr/bin/mc mb scrimflow/avatars --ignore-existing;
      /usr/bin/mc anonymous set public scrimflow/avatars;
      /usr/bin/mc mb scrimflow/screenshots --ignore-existing;
      /usr/bin/mc anonymous set public scrimflow/screenshots;
      /usr/bin/mc mb scrimflow/banners --ignore-existing;
      /usr/bin/mc anonymous set public scrimflow/banners;
      exit 0;
      "
    networks:
      - scrimflow_network

  # --- Next.js Application (Production) ---
  app:
    build:
      context: ./next-app
      dockerfile: ../Dockerfile
      target: runner
    container_name: scrimflow_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@cache:6379
      # MinIO/S3 Configuration
      S3_ENDPOINT: http://storage:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET_AVATARS: avatars
      S3_BUCKET_SCREENSHOTS: screenshots
      S3_BUCKET_BANNERS: banners
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    networks:
      - scrimflow_network
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy

  # --- Python OCR Worker (Production) ---
  # TODO: Uncomment when worker is ready
  # worker:
  #   build:
  #     context: ./worker
  #     dockerfile: Dockerfile
  #   container_name: scrimflow_worker
  #   restart: unless-stopped
  #   environment:
  #     PYTHONUNBUFFERED: 1
  #     DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
  #     REDIS_URL: redis://:${REDIS_PASSWORD}@cache:6379
  #     # MinIO/S3 Configuration
  #     S3_ENDPOINT: http://storage:9000
  #     S3_ACCESS_KEY: ${MINIO_USER}
  #     S3_SECRET_KEY: ${MINIO_PASSWORD}
  #     S3_BUCKET_SCREENSHOTS: screenshots
  #   networks:
  #     - scrimflow_network
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     cache:
  #       condition: service_healthy
  #     storage:
  #       condition: service_healthy

  # --- Reverse Proxy (Caddy) ---
  caddy:
    image: caddy:2-alpine
    container_name: scrimflow_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    networks:
      - scrimflow_network
    depends_on:
      - app

volumes:
  db_data:
    name: scrimflow_db_data
  cache_data:
    name: scrimflow_cache_data
  storage_data:
    name: scrimflow_storage_data
  caddy_data:
    name: scrimflow_caddy_data
  caddy_config:
    name: scrimflow_caddy_config

networks:
  scrimflow_network:
    name: scrimflow_network
    driver: bridge
