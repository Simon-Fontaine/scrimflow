services:
  # --- Database (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    container_name: scrimflow_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    networks:
      - scrimflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Database Migrations ---
  db-migrate:
    build:
      context: ./next-app
      dockerfile: ../Dockerfile.dev
      target: dev
    container_name: scrimflow_db_migrate_dev
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    command: sh -c "pnpm db:migrate"
    networks:
      - scrimflow_network
    depends_on:
      db:
        condition: service_healthy

  # --- Cache & Queue (Redis) ---
  cache:
    image: redis:7-alpine
    container_name: scrimflow_cache_dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - cache_data_dev:/data
    networks:
      - scrimflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Object Storage S3 (MinIO) ---
  storage:
    image: minio/minio:latest
    container_name: scrimflow_storage_dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console
    volumes:
      - storage_data_dev:/data
    networks:
      - scrimflow_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO Initialization (Create Buckets) ---
  storage-init:
    image: minio/mc
    container_name: scrimflow_storage_init_dev
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set scrimflow http://storage:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      /usr/bin/mc mb scrimflow/avatars --ignore-existing;
      /usr/bin/mc anonymous set public scrimflow/avatars;
      /usr/bin/mc mb scrimflow/screenshots --ignore-existing;
      /usr/bin/mc anonymous set public scrimflow/screenshots;
      /usr/bin/mc mb scrimflow/banners --ignore-existing;
      /usr/bin/mc anonymous set public scrimflow/banners;
      exit 0;
      "
    networks:
      - scrimflow_network

  # --- Next.js Application (Development with Hot Reload) ---
  app:
    build:
      context: ./next-app
      dockerfile: ../Dockerfile.dev
      target: dev
    container_name: scrimflow_app_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@cache:6379
      # MinIO/S3 Configuration
      S3_ENDPOINT: http://storage:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET_AVATARS: avatars
      S3_BUCKET_SCREENSHOTS: screenshots
      S3_BUCKET_BANNERS: banners
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      # SMTP (Mailpit)
      SMTP_HOST: mail
      SMTP_PORT: 1025
      SMTP_FROM: noreply@scrimflow.local
    ports:
      - "3000:3000"
    volumes:
      - ./next-app:/app
      - /app/node_modules
      - /app/.next
    networks:
      - scrimflow_network
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy
      mail:
        condition: service_started

  # --- Python OCR Worker (Development) ---
  # TODO: Uncomment when worker is ready
  # worker:
  #   build:
  #     context: ./worker
  #     dockerfile: Dockerfile.dev
  #   container_name: scrimflow_worker_dev
  #   restart: unless-stopped
  #   environment:
  #     PYTHONUNBUFFERED: 1
  #     DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
  #     REDIS_URL: redis://:${REDIS_PASSWORD}@cache:6379
  #     # MinIO/S3 Configuration
  #     S3_ENDPOINT: http://storage:9000
  #     S3_ACCESS_KEY: ${MINIO_USER}
  #     S3_SECRET_KEY: ${MINIO_PASSWORD}
  #     S3_BUCKET_SCREENSHOTS: screenshots
  #   volumes:
  #     - ./worker:/app
  #   networks:
  #     - scrimflow_network
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     cache:
  #       condition: service_healthy
  #     storage:
  #       condition: service_healthy

  # --- Email (Mailpit - catches all outgoing mail in dev) ---
  mail:
    image: axllent/mailpit:latest
    container_name: scrimflow_mail_dev
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - scrimflow_network

  # --- Redis Commander (Development Tool - Redis Web UI) ---
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: scrimflow_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:cache:6379:0:${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - scrimflow_network
    depends_on:
      - cache

volumes:
  db_data_dev:
    name: scrimflow_db_data_dev
  cache_data_dev:
    name: scrimflow_cache_data_dev
  storage_data_dev:
    name: scrimflow_storage_data_dev

networks:
  scrimflow_network:
    name: scrimflow_network_dev
    driver: bridge
